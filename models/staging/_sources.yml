# Oracle WMS source tables from Singer tap extractions
# Data comes FROM Oracle WMS API via flext-tap-oracle-wms (NOT Oracle Database)
# Data is loaded TO standard database via flext-target-* (Postgres/DuckDB)
version: 2

sources:
  - name: oracle_wms_raw
    description: "Raw Oracle WMS data extracted via flext-tap-oracle-wms from Oracle WMS API"
    # Note: Using target database schema (not Oracle database)
    schema: "{{ var('oracle_wms_schema', 'wms_raw') }}"

    # Data freshness monitoring for real-time WMS operations
    freshness:
      warn_after: "{{ var('freshness_warn_after') }}"
      error_after: "{{ var('freshness_error_after') }}"

    # Global configuration for all WMS tables
    config:
      materialized: ephemeral

    tables:
      # Core allocation entity
      - name: allocation
        description: "WMS allocation records for order fulfillment"
        identifier: WMS_ALLOCATION
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique allocation identifier"
            tests:
              - not_null
              - unique
          - name: company_code
            description: "Company code for multi-tenant WMS"
            tests:
              - not_null
          - name: facility_code
            description: "Facility code for warehouse operations"
            tests:
              - not_null
          - name: order_dtl_id
            description: "Reference to order detail"
          - name: from_inventory_id
            description: "Source inventory location"
          - name: to_inventory_id
            description: "Destination inventory location"
          - name: alloc_qty
            description: "Allocated quantity"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_of_type:
                  column_type: number
          - name: status_id
            description: "Allocation status identifier"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null

      # Order header entity
      - name: order_hdr
        description: "WMS order header records"
        identifier: WMS_ORDER_HDR
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique order header identifier"
            tests:
              - not_null
              - unique
          - name: order_nbr
            description: "Business order number"
            tests:
              - not_null
              - unique:
                  where: "company_code is not null and facility_code is not null"
          - name: company_code
            description: "Company code"
            tests:
              - not_null
          - name: facility_code
            description: "Facility code"
            tests:
              - not_null
          - name: order_date
            description: "Order business date"
          - name: order_type
            description: "Type of order (inbound/outbound)"
          - name: order_status
            description: "Current order status"
          - name: customer_id
            description: "Customer identifier"
          - name: total_qty
            description: "Total order quantity"
          - name: total_lines
            description: "Total number of order lines"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null

      # Order detail entity
      - name: order_dtl
        description: "WMS order detail line items"
        identifier: WMS_ORDER_DTL
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique order detail identifier"
            tests:
              - not_null
              - unique
          - name: order_nbr
            description: "Reference to order header"
            tests:
              - not_null
          - name: order_line_nbr
            description: "Line number within order"
            tests:
              - not_null
          - name: company_code
            description: "Company code"
            tests:
              - not_null
          - name: facility_code
            description: "Facility code"
            tests:
              - not_null
          - name: item_id
            description: "Item/SKU identifier"
          - name: ordered_qty
            description: "Ordered quantity"
            tests:
              - dbt_expectations.expect_column_values_to_be_of_type:
                  column_type: number
          - name: shipped_qty
            description: "Shipped quantity"
          - name: status_id
            description: "Line status identifier"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null

      # Inventory entity
      - name: inventory
        description: "WMS inventory positions"
        identifier: WMS_INVENTORY
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique inventory identifier"
            tests:
              - not_null
              - unique
          - name: company_code
            description: "Company code"
            tests:
              - not_null
          - name: facility_code
            description: "Facility code"
            tests:
              - not_null
          - name: item_id
            description: "Item/SKU identifier"
          - name: location_id
            description: "Storage location identifier"
          - name: on_hand_qty
            description: "On-hand inventory quantity"
            tests:
              - dbt_expectations.expect_column_values_to_be_of_type:
                  column_type: number
          - name: available_qty
            description: "Available inventory quantity"
          - name: allocated_qty
            description: "Allocated inventory quantity"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null

      # Location entity
      - name: location
        description: "WMS storage locations"
        identifier: WMS_LOCATION
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique location identifier"
            tests:
              - not_null
              - unique
          - name: locn_brcd
            description: "Location barcode"
            tests:
              - unique:
                  where: "company_code is not null and facility_code is not null"
          - name: company_code
            description: "Company code"
            tests:
              - not_null
          - name: facility_code
            description: "Facility code"
            tests:
              - not_null
          - name: zone_code
            description: "Zone within facility"
          - name: location_type
            description: "Type of location (pick/reserve/etc)"
          - name: location_status
            description: "Current location status"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null

      # Item master entity
      - name: item
        description: "WMS item master data"
        identifier: WMS_ITEM
        loaded_at_field: _sdc_extracted_at
        columns:
          - name: id
            description: "Unique item identifier"
            tests:
              - not_null
              - unique
          - name: item_name
            description: "Item name/description"
          - name: company_code
            description: "Company code"
            tests:
              - not_null
          - name: item_barcode
            description: "Item barcode/UPC"
          - name: item_type
            description: "Item classification type"
          - name: unit_weight
            description: "Unit weight"
          - name: unit_volume
            description: "Unit volume"
          - name: create_ts
            description: "Record creation timestamp"
            tests:
              - not_null
          - name: mod_ts
            description: "Record modification timestamp"
          - name: _sdc_extracted_at
            description: "Singer extraction timestamp"
            tests:
              - not_null
